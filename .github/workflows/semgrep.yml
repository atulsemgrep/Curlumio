on:
  workflow_dispatch: {}
  pull_request: {}
 
name: Semgrep
jobs:
  semgrep:
    name: semgrep/ci
    runs-on: ubuntu-20.04
    env:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
    container:
      image: returntocorp/semgrep
    steps:
    - uses: actions/checkout@v6
    - run: semgrep ci -j 1 & semgrep ci -j 1 & wait
